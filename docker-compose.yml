services:
  db:
    image: postgres:16
    container_name: jobflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobflow
    ports:
      - "5433:5432" # host:container (avoid clash with Homebrew Postgres on 5432)
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobflow-api
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      # IMPORTANT: override host-only DATABASE_URL from .env for container networking
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/jobflow
    ports:
      - "8000:8000"

volumes:
  postgres_data: